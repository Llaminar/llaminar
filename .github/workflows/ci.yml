name: CI

on:
  pull_request:
    branches: [develop, master]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - 'changelog/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '**/*.md'
      - '**/.gitkeep'
  push:
    branches: [develop]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - 'changelog/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '**/*.md'
      - '**/.gitkeep'
  workflow_call:
    inputs:
      image-tag:
        description: "Tag applied to the runtime image published by this workflow"
        required: false
        type: string
        default: ci
    outputs:
      image-ref:
        description: "Full image reference (registry/owner/name:tag) of the published runtime image"
        value: ${{ jobs.publish.outputs.image-ref }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MODELS_DIR: /opt/llaminar-models
  PARITY_HISTORY_DIR: /opt/llaminar-parity-history
  BENCHMARK_HISTORY_DIR: /opt/llaminar-benchmark-history
  # SHA-keyed builder image tag — ephemeral, never pushed to GHCR, unique per
  # workflow run so concurrent runs don't collide on the runner's local docker.
  BUILDER_IMAGE: llaminar-builder:${{ github.sha }}

# =============================================================================
# Workflow layout
# =============================================================================
# Each gate is its own job, all `needs: build`. A failed gate can be re-run
# individually from the GitHub UI ("Re-run failed jobs") without redoing the
# build or any already-passing gate.
#
# All jobs target the `llaminar-bench` self-hosted runner. The runner persists
# /var/lib/docker between jobs, so the builder image tagged by the `build`
# job is visible to every downstream gate by tag — no export/import needed.
#
# The runner runs jobs serially (single GPU), so gates still execute one at
# a time. Total wall-time matches the previous monolithic layout.
# =============================================================================
jobs:
  # -------------------------------------------------------------------------
  # build — compile the builder docker image once.
  # -------------------------------------------------------------------------
  build:
    name: Build builder image
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 120
    outputs:
      builder-image: ${{ env.BUILDER_IMAGE }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Restore ccache from previous runs
        id: ccache-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/.ccache-llaminar
          key: ccache-builder-${{ runner.os }}-${{ hashFiles('Dockerfile', 'scripts/docker/**', 'src/v2/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ccache-builder-${{ runner.os }}-${{ hashFiles('Dockerfile', 'scripts/docker/**', 'src/v2/CMakeLists.txt') }}-
            ccache-builder-${{ runner.os }}-

      - name: Inject ccache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          cache-map: |
            {
              "${{ runner.temp }}/.ccache-llaminar": "/root/.ccache"
            }
          skip-extraction: true

      - name: Build builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: builder
          load: true
          tags: ${{ env.BUILDER_IMAGE }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            LLAMINAR_CUDA_ARCHS=86

      - name: Extract ccache from BuildKit
        if: always()
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          cache-map: |
            {
              "${{ runner.temp }}/.ccache-llaminar": "/root/.ccache"
            }
          skip-extraction: false

      - name: Stage runner host state
        run: |
          if [ ! -d "${MODELS_DIR}" ]; then
            echo "::error::Models directory ${MODELS_DIR} not found on runner."
            exit 1
          fi
          sudo mkdir -p "${PARITY_HISTORY_DIR}" "${BENCHMARK_HISTORY_DIR}"
          sudo chown -R "$(id -u):$(id -g)" "${PARITY_HISTORY_DIR}" "${BENCHMARK_HISTORY_DIR}" || true

  # -------------------------------------------------------------------------
  # Gate 1: unit tests.
  # -------------------------------------------------------------------------
  unit:
    name: Gate — Unit tests
    needs: build
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run unit tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            ctest --test-dir build_v2_integration \
                  -R '^V2_Unit_' \
                  --output-on-failure \
                  --parallel
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-unit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 2a: parity — CPU (all Qwen2 / Qwen3 / Qwen3.5 suites).
  #
  # Runs three Qwen families in parallel inside a single container: one
  # ctest invocation per family, each filtered to pure-CPU tests
  # (backend tag "CPU" anywhere in the test name, and no "CUDA" or "ROCm").
  # Per-family subsets are disjoint by test-name prefix, so the CSV output
  # directories (per-test subdir under tests/v2/integration/parity/results/
  # <git-hash>/<test-name>/) never collide.
  # -------------------------------------------------------------------------
  parity-cpu:
    name: Gate — Parity (CPU, all Qwen families)
    needs: [build, unit]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run CPU parity (Qwen2 ‖ Qwen3 ‖ Qwen3.5)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -v "${PARITY_HISTORY_DIR}:/src/tests/v2/integration/parity/results" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            bash scripts/ci/run_parity_slots.sh \
              qwen2-cpu  '^V2_Integration_Parity_(Qwen2_|NodeLocalTP_Qwen2)' 'CUDA|ROCm' \
              qwen3-cpu  '^V2_Integration_Parity_Qwen3_'                      'CUDA|ROCm' \
              qwen35-cpu '^V2_Integration_Parity_Qwen35_'                     'CUDA|ROCm'
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-parity-cpu-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 2b: parity — GPU (all Qwen2 / Qwen3 / Qwen3.5 suites).
  #
  # 3 parallel phases + 1 serial phase. In each parallel phase, exactly one
  # slot uses CUDA and one uses ROCm, so we never contend for the same GPU
  # type. The final phase runs heterogeneous tests (HybridPPTP / multi-GPU
  # mixed-backend) serially because they need both GPU types simultaneously.
  #
  #   Phase 1 (‖): Qwen2 CUDA    ‖ Qwen3.5 ROCm
  #   Phase 2 (‖): Qwen2 ROCm    ‖ Qwen3.5 CUDA
  #   Phase 3 (‖): Qwen3 CUDA    ‖ Qwen3 ROCm
  #   Phase 4 (serial): heterogeneous (CUDA+ROCm in same test)
  # -------------------------------------------------------------------------
  parity-gpu:
    name: Gate — Parity (GPU, all Qwen families)
    needs: [build, unit]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run GPU parity (phases 1-4)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -v "${PARITY_HISTORY_DIR}:/src/tests/v2/integration/parity/results" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            bash -c '
              set -u
              fail=0
              scripts/ci/run_parity_slots.sh \
                qwen2-cuda  "^V2_Integration_Parity_(Qwen2_|NodeLocalTP_Qwen2).*CUDA" "ROCm" \
                qwen35-rocm "^V2_Integration_Parity_Qwen35_.*ROCm"                     "CUDA" \
                || fail=1
              scripts/ci/run_parity_slots.sh \
                qwen2-rocm  "^V2_Integration_Parity_(Qwen2_|NodeLocalTP_Qwen2).*ROCm" "CUDA" \
                qwen35-cuda "^V2_Integration_Parity_Qwen35_.*CUDA"                     "ROCm" \
                || fail=1
              scripts/ci/run_parity_slots.sh \
                qwen3-cuda "^V2_Integration_Parity_Qwen3_.*CUDA" "ROCm" \
                qwen3-rocm "^V2_Integration_Parity_Qwen3_.*ROCm" "CUDA" \
                || fail=1
              scripts/ci/run_parity_slots.sh \
                hetero "^V2_Integration_Parity_.*(CUDA.*ROCm|ROCm.*CUDA)" "__never_match__" \
                || fail=1
              exit $fail
            '
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-parity-gpu-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 3: E2E server tests.
  # -------------------------------------------------------------------------
  e2e:
    name: Gate — E2E server tests
    needs: [build, parity-cpu, parity-gpu]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run E2E tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            tests/v2/e2e/server/test_server_e2e.sh \
              --binary build_v2_integration/llaminar2 \
              --backends "cpu,cuda:0,rocm:0"
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/srv_*.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 4: performance ratchet.
  # -------------------------------------------------------------------------
  perf:
    name: Gate — Performance ratchet
    needs: [build, parity-cpu, parity-gpu]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run performance ratchet
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -v "${BENCHMARK_HISTORY_DIR}:/benchmark-history" \
            -e LLAMINAR_BENCHMARK_RESULTS_DIR=/benchmark-history \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            .githooks/run_benchmark_check.sh
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-perf-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # publish — always runs. Trend summaries run with `if: always()` so partial
  # failures still publish charts; runtime push is gated on success of every
  # gate via explicit `needs.X.result == 'success'` checks.
  # -------------------------------------------------------------------------
  publish:
    name: Publish (summarize + runtime image)
    needs:
      - build
      - unit
      - parity-cpu
      - parity-gpu
      - e2e
      - perf
    if: always()
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 60
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime-image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=${{ inputs.image-tag || 'ci' }},enable=${{ inputs.image-tag != '' }}

      # Diagnostic: list the persistent host dirs so we can see whether the
      # parity / perf gates actually wrote anything. Useful when the upload
      # steps below say 'No files were found'.
      - name: Diagnostic — list persistent host result dirs
        if: always()
        run: |
          echo "=== ${PARITY_HISTORY_DIR} ==="
          ls -laR "${PARITY_HISTORY_DIR}" 2>&1 | head -100 || true
          echo ""
          echo "=== ${BENCHMARK_HISTORY_DIR} ==="
          ls -laR "${BENCHMARK_HISTORY_DIR}" 2>&1 | head -100 || true

      - name: Summarize parity results
        if: always()
        run: |
          python3 scripts/ci/summarize_parity_results.py \
            --results-root "${PARITY_HISTORY_DIR}" \
            --artifact-name parity-results-${{ github.run_id }}

      - name: Generate parity trend charts
        if: always()
        run: |
          mkdir -p "${{ github.workspace }}/parity-trends"
          docker run --rm \
            -v "${PARITY_HISTORY_DIR}:/parity-history:ro" \
            -v "${{ github.workspace }}/parity-trends:/out" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            python3 scripts/ci/summarize_parity_trends.py \
              --results-root /parity-history \
              --out-dir /out \
              --history 10 \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload parity result CSVs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-results-${{ github.run_id }}
          path: ${{ env.PARITY_HISTORY_DIR }}/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload parity trend charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-trends-${{ github.run_id }}
          path: ${{ github.workspace }}/parity-trends/
          if-no-files-found: ignore
          retention-days: 30

      - name: Summarize performance results
        if: always()
        run: |
          python3 scripts/ci/summarize_perf_results.py \
            --results-root "${BENCHMARK_HISTORY_DIR}"

      - name: Generate performance trend charts
        if: always()
        run: |
          mkdir -p "${{ github.workspace }}/perf-trends"
          docker run --rm \
            -v "${BENCHMARK_HISTORY_DIR}:/bench-history:ro" \
            -v "${{ github.workspace }}/perf-trends:/out" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            python3 scripts/ci/summarize_perf_trends.py \
              --results-root /bench-history \
              --out-dir /out \
              --history 10 \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark result JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_id }}
          path: ${{ env.BENCHMARK_HISTORY_DIR }}/
          if-no-files-found: warn
          retention-days: 90

      - name: Upload performance trend charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-trends-${{ github.run_id }}
          path: ${{ github.workspace }}/perf-trends/
          if-no-files-found: ignore
          retention-days: 30

      - name: Build + push runtime image
        if: |
          needs.build.result == 'success' &&
          needs.unit.result == 'success' &&
          needs.parity-cpu.result == 'success' &&
          needs.parity-gpu.result == 'success' &&
          needs.e2e.result == 'success' &&
          needs.perf.result == 'success'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      - name: Prune builder image
        if: always()
        run: |
          docker image rm "${{ needs.build.outputs.builder-image }}" || true
