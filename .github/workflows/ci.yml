name: CI

on:
  pull_request:
    branches: [develop, master]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - 'changelog/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '**/*.md'
      - '**/.gitkeep'
  push:
    branches: [develop]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - 'changelog/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '**/*.md'
      - '**/.gitkeep'
  workflow_call:
    inputs:
      image-tag:
        description: "Deprecated; runtime image tags are derived from branch, SHA, CUDA, and ROCm versions."
        required: false
        type: string
        default: ""
    outputs:
      image-ref:
        description: "Published runtime image references."
        value: ${{ jobs.runtime-containers.outputs.image-refs }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MODELS_DIR: /opt/llaminar-models
  BUILDER_IMAGE: llaminar-builder:${{ github.sha }}
  CUDA_VERSION: "13.0"
  ROCM_VERSION: "7.1.1"
  RCCL_ONLY_FUNCS: >-
    AllReduce RING/TREE LL/LL128/SIMPLE Sum i8/i32/f16/f32/bf16|Reduce RING LL/LL128/SIMPLE Sum i8/i32/f16/f32/bf16|ReduceScatter RING/PAT LL/LL128/SIMPLE Sum i8/i32/f16/f32/bf16|AllGather RING/PAT LL/LL128/SIMPLE Sum i8/i32/f16/f32/bf16|Broadcast RING LL/LL128/SIMPLE Sum i8/i32/f16/f32/bf16|SendRecv RING SIMPLE Sum i8

jobs:
  build:
    name: Build builder image and unit tests
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 120
    outputs:
      builder-image: ${{ steps.builder-image.outputs.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Record builder image ref
        id: builder-image
        shell: bash
        run: |
          echo "ref=${BUILDER_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Build builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: builder
          network: host
          load: true
          tags: ${{ env.BUILDER_IMAGE }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            LLAMINAR_CUDA_ARCHS=86
            RCCL_ONLY_FUNCS=${{ env.RCCL_ONLY_FUNCS }}

      - name: Stage runner host state
        run: |
          if [ ! -d "${MODELS_DIR}" ]; then
            echo "::error::Models directory ${MODELS_DIR} not found on runner."
            exit 1
          fi

      - name: Preflight - clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh

      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1

      - name: Run unit tests
        run: |
          mapfile -t nvidia_args < <(scripts/ci/docker_gpu_run_args.sh \
            --probe-image "${BUILDER_IMAGE}" \
            --required)
          docker run --rm \
            "${nvidia_args[@]}" \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            --workdir /src \
            ${{ env.BUILDER_IMAGE }} \
            ctest --test-dir build_v2_integration \
                  -R '^V2_Unit_' \
                  --output-on-failure \
                  --parallel

      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-unit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove builder image tag
        if: always()
        run: docker image rm "${{ env.BUILDER_IMAGE }}" || true

  runtime-containers:
    name: Build, test, and publish runtime containers
    needs: build
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 360
    outputs:
      image-refs: ${{ steps.runtime.outputs.image_refs }}
    # Serialize release-container E2E segments across workflow runs so the
    # self-hosted GPU runner never oversubscribes NVIDIA/AMD VRAM.
    concurrency:
      group: llaminar-runtime-container-e2e
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preflight - clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh

      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1

      - name: Build, E2E test, and publish variants
        id: runtime
        run: |
          set -euo pipefail
          args=(--image "${REGISTRY}/${IMAGE_NAME}" --branch "${GITHUB_REF_NAME}" --sha "${GITHUB_SHA}")
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            args+=(--no-push)
          else
            args+=(--push)
          fi
          scripts/ci/build_test_publish_runtime_variants.sh "${args[@]}"

      - name: Upload E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/llaminar-e2e-*-container/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-runtime-containers-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7
