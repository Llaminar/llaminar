name: CI

on:
  pull_request:
    branches: [develop, master]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - 'changelog/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '**/*.md'
      - '**/.gitkeep'
  push:
    branches: [develop]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
      - 'changelog/**'
      - '.devcontainer/**'
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '.editorconfig'
      - '**/*.md'
      - '**/.gitkeep'
  workflow_call:
    inputs:
      image-tag:
        description: "Tag applied to the runtime image published by this workflow"
        required: false
        type: string
        default: ci
    outputs:
      image-ref:
        description: "Full image reference (registry/owner/name:tag) of the published runtime image"
        value: ${{ jobs.publish.outputs.image-ref }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MODELS_DIR: /opt/llaminar-models
  PARITY_HISTORY_DIR: /opt/llaminar-parity-history
  BENCHMARK_HISTORY_DIR: /opt/llaminar-benchmark-history
  # SHA-keyed builder image tag — ephemeral, never pushed to GHCR, unique per
  # workflow run so concurrent runs don't collide on the runner's local docker.
  BUILDER_IMAGE: llaminar-builder:${{ github.sha }}

# =============================================================================
# Workflow layout
# =============================================================================
# Sequential gate pipeline: build → unit → integration → parity → e2e/perf.
#
# All jobs target the `llaminar-bench` self-hosted runner. The runner persists
# /var/lib/docker between jobs, so the builder image tagged by the `build`
# job is visible to every downstream gate by tag — no export/import needed.
# =============================================================================
jobs:
  # -------------------------------------------------------------------------
  # build — compile the builder docker image once.
  # -------------------------------------------------------------------------
  build:
    name: Build builder image
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 120
    outputs:
      builder-image: ${{ env.BUILDER_IMAGE }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Restore ccache from previous runs
        id: ccache-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/.ccache-llaminar
          key: ccache-builder-${{ runner.os }}-${{ hashFiles('Dockerfile', 'scripts/docker/**', 'src/v2/CMakeLists.txt') }}-${{ github.sha }}
          restore-keys: |
            ccache-builder-${{ runner.os }}-${{ hashFiles('Dockerfile', 'scripts/docker/**', 'src/v2/CMakeLists.txt') }}-
            ccache-builder-${{ runner.os }}-

      - name: Inject ccache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          cache-map: |
            {
              "${{ runner.temp }}/.ccache-llaminar": "/root/.ccache"
            }
          skip-extraction: true

      - name: Build builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: builder
          load: true
          tags: ${{ env.BUILDER_IMAGE }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            LLAMINAR_CUDA_ARCHS=86

      - name: Extract ccache from BuildKit
        if: always()
        uses: reproducible-containers/buildkit-cache-dance@v3.3.2
        with:
          cache-map: |
            {
              "${{ runner.temp }}/.ccache-llaminar": "/root/.ccache"
            }
          skip-extraction: false

      - name: Stage runner host state
        run: |
          if [ ! -d "${MODELS_DIR}" ]; then
            echo "::error::Models directory ${MODELS_DIR} not found on runner."
            exit 1
          fi
          sudo mkdir -p "${PARITY_HISTORY_DIR}" "${BENCHMARK_HISTORY_DIR}"
          sudo chown -R "$(id -u):$(id -g)" "${PARITY_HISTORY_DIR}" "${BENCHMARK_HISTORY_DIR}" || true

  # -------------------------------------------------------------------------
  # Gate 1: unit tests.
  # -------------------------------------------------------------------------
  unit:
    name: Gate — Unit tests
    needs: build
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Preflight — clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run unit tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            ctest --test-dir build_v2_integration \
                  -R '^V2_Unit_' \
                  --output-on-failure \
                  --parallel
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-unit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 2: integration tests (non-parity).
  #
  # Runs all V2_Integration_* tests except Parity and RCCL suites.
  # RCCL tests are excluded due to known driver-level flakiness.
  # -------------------------------------------------------------------------
  integration:
    name: Gate — Integration tests
    needs: [build, unit]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Preflight — clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run integration tests (excluding Parity & RCCL)
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            ctest --test-dir build_v2_integration \
                  -R '^V2_Integration_' \
                  -E 'Parity|RCCL' \
                  --output-on-failure
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 3: parity tests (all Qwen families, all backends, sequential).
  # -------------------------------------------------------------------------
  parity:
    name: Gate — Parity tests
    needs: [build, integration]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6
      - name: Preflight — clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run parity tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -v "${PARITY_HISTORY_DIR}:/src/tests/v2/integration/parity/results" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            ctest --test-dir build_v2_integration \
                  -R '^V2_Integration_Parity_' \
                  --output-on-failure
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-parity-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 4: E2E server tests.
  # -------------------------------------------------------------------------
  e2e:
    name: Gate — E2E server tests
    needs: [build, parity]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Preflight — clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run E2E tests
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            tests/v2/e2e/server/test_server_e2e.sh \
              --binary build_v2_integration/llaminar2 \
              --backends "cpu,cuda:0,rocm:0"
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            /tmp/srv_*.log
          if-no-files-found: ignore
          retention-days: 14
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # Gate 5: performance ratchet.
  # -------------------------------------------------------------------------
  perf:
    name: Gate — Performance ratchet
    needs: [build, parity]
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Preflight — clear stale MPI/IPC state
        run: bash scripts/ci/preflight_clean.sh
      - name: Configure core-dump capture
        run: |
          sudo mkdir -p "${{ github.workspace }}/cores"
          sudo chmod 1777 "${{ github.workspace }}/cores"
          sudo sysctl -w "kernel.core_pattern=${{ github.workspace }}/cores/core.%e.%p.%t"
          sudo sysctl -w kernel.core_uses_pid=1
      - name: Run performance ratchet
        run: |
          docker run --rm \
            --gpus all \
            --device=/dev/kfd --device=/dev/dri \
            --group-add video --group-add render \
            --cap-add SYS_NICE --cap-add SYS_PTRACE \
            --ulimit core=-1 \
            --ipc=host --shm-size=16g \
            -v "${MODELS_DIR}:/src/models:ro" \
            -v "${BENCHMARK_HISTORY_DIR}:/benchmark-history" \
            -e LLAMINAR_BENCHMARK_RESULTS_DIR=/benchmark-history \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            .githooks/run_benchmark_check.sh
      - name: Upload core dumps on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cores-perf-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}/cores/
          if-no-files-found: ignore
          retention-days: 7

  # -------------------------------------------------------------------------
  # publish — always runs. Trend summaries run with `if: always()` so partial
  # failures still publish charts; runtime push is gated on success of every
  # gate via explicit `needs.X.result == 'success'` checks.
  # -------------------------------------------------------------------------
  publish:
    name: Publish (summarize + runtime image)
    needs:
      - build
      - unit
      - integration
      - parity
      - e2e
      - perf
    if: always()
    runs-on: [self-hosted, linux, x64, llaminar-bench]
    timeout-minutes: 60
    outputs:
      image-ref: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve runtime-image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=${{ inputs.image-tag || 'ci' }},enable=${{ inputs.image-tag != '' }}

      # Diagnostic: list the persistent host dirs so we can see whether the
      # parity / perf gates actually wrote anything. Useful when the upload
      # steps below say 'No files were found'.
      - name: Diagnostic — list persistent host result dirs
        if: always()
        run: |
          echo "=== ${PARITY_HISTORY_DIR} ==="
          ls -laR "${PARITY_HISTORY_DIR}" 2>&1 | head -100 || true
          echo ""
          echo "=== ${BENCHMARK_HISTORY_DIR} ==="
          ls -laR "${BENCHMARK_HISTORY_DIR}" 2>&1 | head -100 || true

      - name: Summarize parity results
        if: always()
        run: |
          python3 scripts/ci/summarize_parity_results.py \
            --results-root "${PARITY_HISTORY_DIR}" \
            --artifact-name parity-results-${{ github.run_id }}

      - name: Generate parity trend charts
        if: always()
        run: |
          mkdir -p "${{ github.workspace }}/parity-trends"
          docker run --rm \
            -v "${PARITY_HISTORY_DIR}:/parity-history:ro" \
            -v "${{ github.workspace }}/parity-trends:/out" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            python3 scripts/ci/summarize_parity_trends.py \
              --results-root /parity-history \
              --out-dir /out \
              --history 10 \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload parity result CSVs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-results-${{ github.run_id }}
          path: ${{ env.PARITY_HISTORY_DIR }}/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload parity trend charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parity-trends-${{ github.run_id }}
          path: ${{ github.workspace }}/parity-trends/
          if-no-files-found: ignore
          retention-days: 30

      - name: Summarize performance results
        if: always()
        run: |
          python3 scripts/ci/summarize_perf_results.py \
            --results-root "${BENCHMARK_HISTORY_DIR}"

      - name: Generate performance trend charts
        if: always()
        run: |
          mkdir -p "${{ github.workspace }}/perf-trends"
          docker run --rm \
            -v "${BENCHMARK_HISTORY_DIR}:/bench-history:ro" \
            -v "${{ github.workspace }}/perf-trends:/out" \
            --workdir /src \
            ${{ needs.build.outputs.builder-image }} \
            python3 scripts/ci/summarize_perf_trends.py \
              --results-root /bench-history \
              --out-dir /out \
              --history 10 \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark result JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_id }}
          path: ${{ env.BENCHMARK_HISTORY_DIR }}/
          if-no-files-found: warn
          retention-days: 90

      - name: Upload performance trend charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-trends-${{ github.run_id }}
          path: ${{ github.workspace }}/perf-trends/
          if-no-files-found: ignore
          retention-days: 30

      - name: Build + push runtime image
        if: |
          needs.build.result == 'success' &&
          needs.unit.result == 'success' &&
          needs.integration.result == 'success' &&
          needs.parity.result == 'success' &&
          needs.e2e.result == 'success' &&
          needs.perf.result == 'success'
        env:
          LLAMINAR_IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          LLAMINAR_IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
          VERSION: ${{ github.ref_name }}
          VCS_REF: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.repository.updated_at }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            scripts/docker/build-runtime-image.sh --load
          else
            scripts/docker/build-runtime-image.sh --push
          fi

      - name: Prune builder image
        if: always()
        run: |
          docker image rm "${{ needs.build.outputs.builder-image }}" || true
