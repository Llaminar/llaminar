# Superseded by configs/moe_overlay/*.yaml. Kept as a graph-native
# compatibility alias for the original ROCm-hot / CPU-cold overlay layout.
# benchmark: topology=rocm_hot/cpu_cold
# benchmark: model_requirement=Qwen3.5-35B-A3B MoE GGUF with 256 routed experts
# benchmark: mpi_ranks=2
# benchmark: policy=histogram whole-expert ROCm cache with one CPU fallback tier
# benchmark: output_dir=benchmark_results/moe_overlay/<timestamp-or-git-hash>/
# benchmark: env=LLAMINAR_PROFILING=1 LLAMINAR_MOE_EP_PROFILE_CSV=<run-dir>/moe_overlay_profile.csv

benchmark:
  output_dir_template: "benchmark_results/moe_overlay/<timestamp-or-git-hash>/"
  model_env: "LLAMINAR_MOE_OVERLAY_MODEL"
  required_env: "LLAMINAR_PROFILING=1"
  profiler_csv_env: "LLAMINAR_MOE_EP_PROFILE_CSV"
  mpi_ranks: 2
  policy: "histogram whole-expert ROCm cache with CPU fallback"

moe_expert_parallel:
  enabled: true
  execution_kind: tiered
  continuation_domain: rocm_hot
  base_model_domain: rocm_hot
  shared_expert_domain: rocm_hot
  residency:
    mode: histogram
  domains:
    - "rocm_hot=0:rocm:0;scope=single;backend=rccl;compute=replicated_experts;owner=0"
    - "cpu_cold=1:cpu:0;scope=local;backend=host;compute=replicated_experts;owner=1"
  routed_tiers:
    - "hot@rocm_hot;priority=0;max-experts-per-layer=128;memory-mb=auto"
    - "cold@cpu_cold;priority=1;fallback=true"