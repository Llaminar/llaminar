# Graph-native MoE overlay Release benchmark config.
# benchmark: topology=cuda_hot rank0, rocm_warm rank1
# benchmark: model_requirement=Qwen3.5-35B-A3B MoE GGUF with 256 routed experts
# benchmark: mpi_ranks=2
# benchmark: policy=static-by-id whole-expert all-GPU placement, 128 CUDA + 128 ROCm experts
# benchmark: output_dir=benchmark_results/moe_overlay/<timestamp-or-git-hash>/
# benchmark: env=LLAMINAR_PROFILING=1 LLAMINAR_MOE_EP_PROFILE_CSV=<run-dir>/moe_overlay_profile.csv

benchmark:
  output_dir_template: "benchmark_results/moe_overlay/<timestamp-or-git-hash>/"
  model_env: "LLAMINAR_MOE_OVERLAY_MODEL"
  required_env: "LLAMINAR_PROFILING=1"
  profiler_csv_env: "LLAMINAR_MOE_EP_PROFILE_CSV"
  mpi_ranks: 2
  policy: "static-by-id all-GPU whole-expert tiers"

moe_expert_parallel:
  enabled: true
  execution_kind: tiered
  continuation_domain: cuda_hot
  base_model_domain: cuda_hot
  shared_expert_domain: cuda_hot
  residency:
    mode: static-by-id
  domains:
    - "cuda_hot=0:cuda:0;scope=single;backend=nccl;compute=replicated_experts;owner=0"
    - "rocm_warm=1:rocm:0;scope=local;backend=rccl;compute=replicated_experts;owner=1"
  routed_tiers:
    - "hot@cuda_hot;priority=0;max-experts-per-layer=128;memory-mb=auto"
    - "warm@rocm_warm;priority=1;max-experts-per-layer=128;memory-mb=auto"